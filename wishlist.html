<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist - Steez Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#050505">
<style>
body{font-family:Inter,system-ui,Arial;background:#050505;color:#fff;padding:30px}
.container{max-width:920px;margin:0 auto}
.item{display:flex;gap:16px;align-items:center;padding:12px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:12px}
.item img{width:100px;height:80px;object-fit:cover;border-radius:8px}
.controls{margin-left:auto;display:flex;gap:8px}
.btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
.btn-danger{background:#ff1c1c;color:#fff}
.btn-primary{background:#fff;color:#000}
.empty{opacity:0.7}
</style>
</head>
<body>
<div class="container">
<h1>Wishlist</h1>
<div id="items"></div>
<p><a href="index.html">← Back to shop</a></p>
</div>
<script>
function renderWishlist(){
  const list = JSON.parse(localStorage.getItem('wishlist')) || [];
  const el = document.getElementById('items');
  el.innerHTML = '';
  if(!list.length){
    el.innerHTML = '<p class="empty">Your wishlist is empty.</p>';
    return;
  }
  list.forEach((p,i)=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <img src="${p.img||'https://via.placeholder.com/400'}" alt="${p.name}">
      <div>
        <strong>${p.name}</strong>
        <div>R${p.price}</div>
        <div style="color:#aaa;font-size:13px">${p.specs||''}</div>
      </div>
      <div class="controls">
        <button class="btn btn-danger" data-i="${i}">Remove</button>
      </div>`;
    el.appendChild(div);
  });
  document.querySelectorAll('.btn-danger').forEach(b=>b.addEventListener('click',e=>{
    const idx = Number(e.currentTarget.getAttribute('data-i'));
    const list = JSON.parse(localStorage.getItem('wishlist')) || [];
    list.splice(idx,1);
    localStorage.setItem('wishlist', JSON.stringify(list));
    renderWishlist();
  }));
}
renderWishlist();
</script>
</body>
</html>
